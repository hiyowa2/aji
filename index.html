<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>割合計算</title>

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f5f5f5;
    font-family:sans-serif;

    padding:10px;
    box-sizing:border-box;

    overflow:hidden;
}

.container{
    display:flex;
    align-items:flex-end;
    justify-content:center;

    gap:12px;

    width:fit-content;
    max-width:100%;

    transform:scale(0.8);
    transform-origin:center;
}

.left{
    text-align:center;
}

.top-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.box{
    width:min(42vw,320px);
    height:min(14vw,90px);

    min-height:50px;

    border:2px solid black;
    border-radius:8px;

    font-size:min(6vw,40px);
    text-align:center;

    background:white;
    box-sizing:border-box;
}

.small-result{
    min-width:80px;

    font-size:min(5vw,32px);

    text-align:left;
}

.line{
    width:min(60vw,450px);
    height:2px;
    background:black;

    margin-top:10px;
}

.bottom-input{
    width:min(30vw,220px);

    border:none;
    outline:none;

    background:transparent;

    text-align:center;

    font-size:min(5vw,34px);

    margin-top:10px;
}

.equal{
    font-size:min(8vw,60px);
    padding-bottom:25px;
}

.result-area{
    display:flex;
    align-items:flex-end;
    gap:6px;

    padding-bottom:10px;
}

.result-box{
    width:min(28vw,240px);
    height:min(14vw,90px);

    min-height:50px;

    border:2px solid black;
    border-radius:8px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:white;
    box-sizing:border-box;
}

.result-input{
    width:100%;
    height:100%;

    border:none;
    outline:none;

    text-align:center;

    font-size:min(5vw,34px);

    background:transparent;
}

.percent{
    font-size:min(5vw,34px);
    padding-bottom:8px;
}

input{
    border:none;
    outline:none;
}

</style>
</head>
<body>

<div class="container">

    <div class="left">

        <div class="top-row">

            <input
                type="text"
                id="value"
                class="box"
                oninput="calcFromA()"
            >

            <div>=</div>

            <div
                class="small-result"
                id="aResult"
            >
                0
            </div>

        </div>

        <div class="line"></div>

        <input
            type="text"
            id="maxValue"
            class="bottom-input"
            value="800000"
            oninput="recalculate()"
        >

    </div>

    <div class="equal">=</div>

    <div class="result-area">

        <div class="result-box">

            <input
                type="text"
                id="percentInput"
                class="result-input"
                oninput="calcFromC()"
            >

        </div>

        <div class="percent">%</div>

    </div>

</div>

<script>

let updating = false;

function parseExpression(str){

    try{

        str = str.replace(/\^/g, "**");
        str = str.replace(/×/g, "*");

        return Function(
            "return " + str
        )();

    }catch{

        return NaN;
    }
}

function getMaxValue(){

    return parseExpression(
        document.getElementById("maxValue").value
    ) || 1;
}

function updateAResult(a){

    document.getElementById("aResult").textContent =
        Number(a.toFixed(5));
}

function calcFromA(){

    if(updating) return;
    updating = true;

    const a = parseExpression(
        document.getElementById("value").value
    );

    const max = getMaxValue();

    updateAResult(a);

    const c = (a / max) * 100;

    document.getElementById("percentInput").value =
        Number(c.toFixed(5));

    updating = false;
}

function calcFromC(){

    if(updating) return;
    updating = true;

    const c = parseExpression(
        document.getElementById("percentInput").value
    );

    const max = getMaxValue();

    const a = (c / 100) * max;

    updateAResult(a);

    document.getElementById("value").value =
        Number(a.toFixed(5));

    updating = false;
}

function recalculate(){

    calcFromA();
}

</script>

</body>
</html>

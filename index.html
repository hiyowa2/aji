<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>割合計算</title>

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f5f5f5;
    font-family:sans-serif;

    padding:10px;
    box-sizing:border-box;

    overflow-x:hidden;
}

.container{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:3vw;

    width:100%;
}

.left{
    text-align:center;
    flex-shrink:1;
}

.box{
    width:min(42vw,320px);
    height:min(14vw,90px);

    min-height:50px;

    border:2px solid black;
    border-radius:8px;

    font-size:min(6vw,40px);
    text-align:center;

    background:white;
    box-sizing:border-box;
}

.line{
    width:min(48vw,360px);
    height:2px;
    background:black;

    margin-top:10px;
}

.bottom{
    font-size:min(5vw,34px);
    margin-top:10px;
}

.equal{
    font-size:min(8vw,60px);
    padding-bottom:25px;

    flex-shrink:0;
}

.result-area{
    display:flex;
    align-items:flex-end;
    gap:6px;

    padding-bottom:10px;

    flex-shrink:1;
}

.result-box{
    width:min(28vw,240px);
    height:min(14vw,90px);

    min-height:50px;

    border:2px solid black;
    border-radius:8px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:white;
    box-sizing:border-box;
}

.result-input{
    width:100%;
    height:100%;

    border:none;
    outline:none;

    text-align:center;

    font-size:min(5vw,34px);

    background:transparent;
}

.percent{
    font-size:min(5vw,34px);
    padding-bottom:8px;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}

input[type=number]{
    appearance:textfield;
}

</style>
</head>
<body>

<div class="container">

    <div class="left">

        <input
            type="number"
            id="value"
            class="box"
            min="1"
            max="800000"
            oninput="calcFromA()"
        >

        <div class="line"></div>

        <div class="bottom">
            800000
        </div>

    </div>

    <div class="equal">=</div>

    <div class="result-area">

        <div class="result-box">

            <input
                type="number"
                id="percentInput"
                class="result-input"
                oninput="calcFromC()"
            >

        </div>

        <div class="percent">%</div>

    </div>

</div>

<script>

let updating = false;

function calcFromA(){

    if(updating) return;
    updating = true;

    const a = Number(
        document.getElementById("value").value
    );

    const c = (a / 800000) * 100;

    document.getElementById("percentInput").value =
        Number(c.toFixed(5));

    updating = false;
}

function calcFromC(){

    if(updating) return;
    updating = true;

    const c = Number(
        document.getElementById("percentInput").value
    );

    const a = (c / 100) * 800000;

    document.getElementById("value").value =
        Number(a.toFixed(5));

    updating = false;
}

</script>

</body>
</html>
